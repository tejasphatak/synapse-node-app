name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Extract version
        id: ver
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Compute checksum
        id: sum
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          SHA=$(sha256sum "$APK" | awk '{print $1}')
          SIZE=$(stat -c %s "$APK" | awk '{printf "%.1f MB", $1/1024/1024}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: cp app/build/outputs/apk/release/app-release.apk synapse-${{ steps.ver.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Synapse Node ${{ steps.ver.outputs.tag }}
          body: |
            ## Synapse Node ${{ steps.ver.outputs.tag }}

            **Download:** [synapse-${{ steps.ver.outputs.tag }}.apk](synapse-${{ steps.ver.outputs.tag }}.apk) (${{ steps.sum.outputs.size }})

            **SHA256:** `${{ steps.sum.outputs.sha256 }}`

            See [CHANGELOG.md](https://github.com/tejasphatak/synapse-node-app/blob/main/CHANGELOG.md) or the commit log for changes.

            ---
            *AI-generated app — built by Claude, idea by Tejas.*
          files: |
            synapse-${{ steps.ver.outputs.tag }}.apk
          draft: false
          prerelease: false

      - name: Cleanup keystore
        if: always()
        run: rm -f release.keystore
