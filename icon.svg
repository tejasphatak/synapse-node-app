<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%" stop-color="#0F1F18"/>
      <stop offset="100%" stop-color="#040A07"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F0FFF4"/>
      <stop offset="60%" stop-color="#7FEFB9"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Neural mesh — more connections, denser than cortex2 -->
  <g stroke="#22C55E" stroke-width="2" opacity="0.55" stroke-linecap="round">
    <line x1="256" y1="256" x2="180" y2="140"/>
    <line x1="256" y1="256" x2="332" y2="140"/>
    <line x1="256" y1="256" x2="400" y2="220"/>
    <line x1="256" y1="256" x2="400" y2="292"/>
    <line x1="256" y1="256" x2="332" y2="372"/>
    <line x1="256" y1="256" x2="180" y2="372"/>
    <line x1="256" y1="256" x2="112" y2="292"/>
    <line x1="256" y1="256" x2="112" y2="220"/>
    <!-- Inter-node (the fabric) -->
    <line x1="180" y1="140" x2="332" y2="140" opacity="0.35"/>
    <line x1="400" y1="220" x2="400" y2="292" opacity="0.35"/>
    <line x1="332" y1="372" x2="180" y2="372" opacity="0.35"/>
    <line x1="112" y1="220" x2="112" y2="292" opacity="0.35"/>
  </g>

  <!-- Nodes -->
  <g fill="#7FEFB9">
    <circle cx="180" cy="140" r="14"/>
    <circle cx="332" cy="140" r="14"/>
    <circle cx="400" cy="220" r="14"/>
    <circle cx="400" cy="292" r="14"/>
    <circle cx="332" cy="372" r="14"/>
    <circle cx="180" cy="372" r="14"/>
    <circle cx="112" cy="292" r="14"/>
    <circle cx="112" cy="220" r="14"/>
  </g>

  <!-- Core synapse -->
  <circle cx="256" cy="256" r="44" fill="url(#core)"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#7FEFB9" stroke-width="1.5" opacity="0.3"/>
</svg>
